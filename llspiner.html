<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>llll</title>

<!-- ✍️ 手写体字体 -->
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

<style>
    body {
        margin: 0;
        font-family: 'Patrick Hand', cursive;
        background: #0a0a0a;
        color: white;
        text-align: center;
    }

    h1 {
        margin-top: 40px;
        font-weight: normal;
        letter-spacing: 2px;
        font-size: 32px;
    }

    #box {
        margin: 60px auto;
        width: 320px;
        height: 320px;
        background: #111;
        border-radius: 12px;
        overflow: hidden;
    }

    img {
        width: 100%;
        height: 100%;
        object-fit: cover;

        /* 🎭 乱码/扫描感 */
        filter: blur(12px) contrast(200%) brightness(1.2);
        transition: filter 0.3s ease;
    }

    .clear {
        filter: blur(0px);
    }

    button {
        margin-top: 20px;
        padding: 12px 26px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        background: white;
        color: black;

        font-family: 'Patrick Hand', cursive;
    }

    button:disabled {
        opacity: 0.5;
    }
</style>
</head>

<body>

<h1>萝莉抽抽乐</h1>

<div id="box">
    <img id="img">
</div>

<button id="btn" onclick="start()">抽我！！</button>

<script>
    let max = 88;
    let timer = null;

    function start() {
        let img = document.getElementById("img");
        let btn = document.getElementById("btn");

        btn.disabled = true;
        img.classList.remove("clear");

        timer = setInterval(() => {
            let num = Math.floor(Math.random() * max) + 1;
            let name = String(num).padStart(3, "0") + ".jpg";
            img.src = name;
        }, 60);

        let duration = 3000 + Math.random() * 2000;

        setTimeout(() => {
            clearInterval(timer);

            let final = Math.floor(Math.random() * max) + 1;
            let name = String(final).padStart(3, "0") + ".jpg";

            img.src = name;

            setTimeout(() => {
                img.classList.add("clear");
                btn.disabled = false;
            }, 200);

        }, duration);
    }
</script>

</body>
</html>
